<!DOCTYPE html>
<html>
    <head>
        <title>G.apps</title>
        <link rel="stylesheet" href="awsm.min.css">
        <link rel="stylesheet" href="98.css">
        <!-- <a href="https://www.flaticon.com/free-icons/programmer" title="programmer icons">Programmer icons created by Eucalyp - Flaticon</a> -->
        <link rel="icon" type="image/png" href="programing.png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            :root { --bg: #1a1a1a; --fg: #fff; }
            :root.light { --bg: #fff5d6; --fg: #333; }

            html {
                min-height: 100vh;
                background: var(--bg);
                transition: background .3s;
            }

            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                color: var(--fg);
                transition: color .3s;
            }

            #theme-toggle {
                all: unset;
                cursor: pointer;
                line-height: 1;
                color: var(--fg);
                opacity: .6;
                transition: opacity .2s, color .3s;
            }
            #theme-toggle:hover { opacity: 1; }
            #theme-toggle svg {
                width: 20px;
                height: 20px;
            }

            .sun-icon { display: block; }
            .moon-icon { display: none; }
            :root.light .sun-icon { display: none; }
            :root.light .moon-icon { display: block; }
        </style>
    </head>
    <script>
        window.addEventListener("load", () => {
            console.log("Loaded");
            let storage = window.localStorage;
            let ut_visit = storage.getItem("ut_visit");
            if (ut_visit == null)
            {
                storage.setItem("ut_visit", Date.now());
                document.getElementById("message_box").style.display = "block";
            }
            else
            {
                let ut_visit = storage.getItem("ut_visit");
                let current_time = Date.now()

                if (current_time - ut_visit >= 24 * 3600 * 1000)
                {
                    storage.setItem("ut_visit", Date.now());
                    document.getElementById("message_box").style.display = "block";
                }
                else 
                {
                    document.getElementById("system").style = "pointer-events: all";
                }
            }

            const saved = localStorage.getItem('theme');
            if (saved) document.documentElement.className = saved;

            document.getElementById('theme-toggle').addEventListener('click', () => {
                const root = document.documentElement;
                root.className = root.className === 'light' ? 'dark' : 'light';
                localStorage.setItem('theme', root.className);
            });
        });

    </script>
    <body>
        <header>
            <div>
                <h1>G.apps</h1>
                <p><i>a software engineering company</i></p>
            </div>
            <button id="theme-toggle" aria-label="Toggle theme">
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </header>
        <main>
            <!-- TODO: rewrite as svelte app, someday -->
            <center>
                <div id="system" class="window" style="pointer-events: none;">
                    <div class="title-bar">
                        <div class="title-bar-text">
                            G.system 
                        </div>
                        <div class="title-bar-controls">
                            <button onClick="window.location.href='https://oschepkov.ru';" aria-label="Close"></button>
                        </div>
                    </div>
                    <div class="window-body">
                        <img src="img/xp.jpg">
                        <div style="position: absolute; top: 64px; left: 32px" onClick="document.getElementById('glxgears').style.display = 'block'; document.getElementById('gears_iframe').focus();">
                            <img height="42px" width="42px" src="apps/gears/engineering.png">
                            <label for="glxgears"><b>webglxgears</b></label>
                        </div>
                        <div style="position: absolute; top: 128px; left: 160px" onClick="document.getElementById('fib').style.display = 'block';">
                            <img height="42px" width="42px" src="apps/fibonacci/fibonacci.png">
                            <label for="fibonacci"><b>fibonacci</b></label>
                        </div>
                        <div style="position: absolute; top: 54px; left: 70%">
                            <img style="-webkit-filter: grayscale(1); filter: greyscale(1);" height="42px" width="42px" src="apps/donut/donut.png">
                            <label style="color: darkgrey;" for="donut"><b>Donut</b></label>
                        </div>
                        <div style="position: absolute; top: 64%; left: 65%" onClick="window.location.href='https://github.com/gaps-apps/';">
                            <img height="42px" width="42px" src="apps/github/github.png">
                            <label for="github"><b>GitHub</b></label>
                        </div>
                        <div style="position: absolute; top: 64%; left: 80%">
                            <img height="42px" width="42px" src="apps/sendmail/gmail.png" onClick="window.location.href='mailto:ivan@oschepkov.ru?subject=G.apps';">
                            <label for="contact"><b>Contact</b></label>
                        </div>
                        <div id="fib" class="window" style="min-width: 270px; position: absolute; top: 50%; left: 50%; transform: translateY(-50%) translateX(-50%); display: none;">
                            <div class="title-bar">
                                <div class="title-bar-text">
                                   Tiny Wasm Example [<a style="color:white !important;" href='https://github.com/mohanson/pywasm/blob/master/examples/fib.wat'>github</a>]	
                                </div>
                                <div class="title-bar-controls">
                                    <button onClick="document.getElementById('fib').style.display = 'none';" aria-label="Close"></button>
                                </div>
                            </div>
                            <div class="window-body">
                                <iframe id="fib_iframe" src="apps/fibonacci/index.html"></iframe>
                                <p>118 bytes of Wasm32</p>
                            </div>
                        </div>
                        <div id="donut" class="window" style="min-width: 270px; position: absolute; top: 50%; left: 50%; transform: translateY(-50%) translateX(-50%); display: none;">
                            <div class="title-bar">
                                <div class="title-bar-text">
                                    donut [myself]
                                </div>
                                <div class="title-bar-controls">
                                    <button onClick="document.getElementById('donut').style.display = 'none';" aria-label="Close"></button>
                                </div>
                            </div>
                            <div class="window-body">
                                <iframe id="donut_iframe" src=""></iframe>
                            </div>
                        </div>
                        <div id="glxgears" class="window" style="min-width: 270px; position: absolute; top: 50%; left: 50%; transform: translateY(-50%) translateX(-50%); display: none;">
                            <div class="title-bar">
                                <div class="title-bar-text">
                                    webglxgears by David Timber [<a style="color: white !important;" href='https://github.com/ashegoulding/webglgears'>github.com</a>]
                                </div>
                                <div class="title-bar-controls">
                                    <button onClick="document.getElementById('glxgears').style.display = 'none';" aria-label="Close"></button>
                                </div>
                            </div>
                            <div class="window-body">
                                <iframe id="gears_iframe" src="apps/gears/glxgears.html"></iframe>
                                <p>Use arrows or touch.</p>
                            </div>
                        </div>
                        <div id="message_box" class="window" style="display: none; pointer-events: all; min-width: 270px; position: absolute; top: 50%; left: 50%; transform: translateY(-50%) translateX(-50%);">
                            <div class="title-bar">
                                <div class="title-bar-text">
                                    Message of the Day 
                                </div>
                                <div class="title-bar-controls">
                                    <button onClick="document.getElementById('message_box').style = 'display: none;'; document.getElementById('system').style = 'pointer-events: all;'" aria-label="Close"></button>
                                </div>
                            </div>
                            <div class="window-body"> 
                                <p align="left"><em>If you cannot do great things, do small things in a great way.</em></p>
                                <section class="field-row" style="justify-content: flex-end">
                                    <button onClick="document.getElementById('message_box').style.display = 'none'; document.getElementById('system').style = 'pointer-events: all;';">OK</button>
                                </section>
                            </div>
                        </div>
                    </div>
                </div>
            </center>
        </main>
    </body>
</html>
